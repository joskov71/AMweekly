name: Create webpage snapshot

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Take screenshot from local index.html
        run: |
          cat > screenshot.js <<'EOF'
          const { chromium } = require('playwright');
          const path = require('path');
          const { pathToFileURL } = require('url');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({
              viewport: { width: 1400, height: 1000 },
              deviceScaleFactor: 1
            });

            const fileUrl = pathToFileURL(path.join(process.cwd(), 'index.html')).href;

            await page.goto(fileUrl, {
              waitUntil: 'networkidle'
            });

            // Give external fonts/images a little extra time.
            await page.evaluate(() => document.fonts && document.fonts.ready);
            await page.waitForTimeout(2000);

            await page.screenshot({
              path: 'snapshot.png',
              fullPage: false
            });

            await browser.close();
          })();
          EOF

          node screenshot.js

      - name: Commit snapshot
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add snapshot.png
          git commit -m "Update webpage snapshot" || echo "No snapshot changes"
          git push
